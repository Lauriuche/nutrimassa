                                                <div class="bg-neutral-800 rounded-lg p-1.5 border border-neutral-700/50">

                                                    <span class="block text-[9px] sm:text-[10px] text-neutral-500 uppercase mb-0.5">Gord</span>
                                                    <span class="font-bold text-yellow-400 text-xs sm:text-sm">${recipe.macros.fat}g</span>

                            ${renderPantryGrid()}

            }

                const categories = [
                    { id: 'energia', data: pantry.energia, label: "Energia", icon: 'flame', color: 'text-red-400' },
                    { id: 'proteina', data: pantry.proteina, label: "Proteína", icon: 'dumbbell', color: 'text-blue-400' },

                                                </button>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>

                                <div class="w-full lg:w-72 flex flex-col justify-end mt-2 lg:mt-0 relative z-10">

                };

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                    const json = await res.json();

                    if (!res.ok) throw new Error(json.error?.message || "Erro na API do Gemini.");

                    const aiText = json?.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (aiText) {
                        const aiData = JSON.parse(aiText);
                        const validGoal = ['massa', 'perda', 'recomp'].includes(aiData.goal) ? aiData.goal : 'recomp';
                        const newRecipe = {
                            id: Date.now().toString(), name: aiData.name + " ✨", goal: validGoal,
                            type: aiData.type, icon: "Sparkles", macros: aiData.macros,
                            ingredients: aiData.ingredients, instructions: aiData.instructions, isCustom: true,
                            user_id: state.user.uid
                        };

                        if (isCloudEnabled && supabaseClient) {
                            await supabaseClient.from('recipes').insert([newRecipe]);
                            state.userRecipes.unshift(newRecipe);
                        } else {
                            // MODO LOCAL
                            state.userRecipes.unshift(newRecipe);
                            saveLocalData();
                        }
                        
                        state.selectedRecipe = newRecipe;
                        state.activeTab = 'recipes';
                        state.currentGoalId = validGoal;
                        state.selectedAIIngredients = [];
                        state.searchTerm = '';
                    }
                } catch (e) {
                    state.aiError = "Erro ao gerar receita. Verifique sua chave API se estiver rodando localmente.";
                    console.error(e);
                } finally {
                    state.isGenerating = false;
                    render();
                }
            }
        };

        // --- INICIALIZAÇÃO ---
        const init = async () => {
            loadLocalData();

            if (isCloudEnabled && supabaseClient) {
                // Carregar Receitas do Supabase
                const { data: recipesData } = await supabaseClient
                    .from('recipes')
                    .select('*')
                    .eq('user_id', state.user.uid)
                    .order('id', { ascending: false });
                
                if (recipesData) state.userRecipes = recipesData;

                // Carregar Despensa do Supabase
                const { data: pantryData } = await supabaseClient
                    .from('pantry')
                    .select('*')
                    .eq('user_id', state.user.uid)
                    .order('id', { ascending: false });

                if (pantryData) state.userIngredients = pantryData;
            }

            render();
        };

        // Iniciar aplicação
        init();
    </script>
</body>
</html>
